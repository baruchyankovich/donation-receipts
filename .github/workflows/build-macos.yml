name: Build macOS app

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: python -m pip install --upgrade pip pyinstaller openpyxl
      - name: Build .app bundle
        run: pyinstaller --windowed --name DonationReceipts main.py
      - name: Zip the app bundle
        run: ditto -c -k --keepParent dist/DonationReceipts.app DonationReceipts-macos.zip
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DonationReceipts-macos
          path: DonationReceipts-macos.zip
          if-no-files-found: error
